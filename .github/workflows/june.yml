name: Terraform Pipeline

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Azure Login and Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: |
		    {
			"clientSecret":  "38A8Q~U~aTmk33LX5b0KdO8NaGRS0Y_fWKG.3bqo",
			"subscriptionId":  "bc401604-b6cc-41b5-8eb3-22ccca3b29ff",
			"tenantId":  "36df4507-8aab-483e-88d3-d7982c300017",
			"clientId":  "ef918e69-be10-4267-9ac6-87000e61deb6"
		    }

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.6"

      - name: Terraform init
        run: terraform init

      - name: Terraform fmt
        run: terraform fmt -check

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan

      - name: Terraform apply
        run: terraform apply -auto-approve
